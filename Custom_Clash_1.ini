# OpenClash v2.x / Mihomo 代理组配置模板
# 文件名: proxy-groups-template.yaml

# 代理提供器配置（必须）
proxy-providers:
  default:
    type: http
    url: "YOUR_SUBSCRIPTION_URL"  # 替换为你的订阅地址
    interval: 3600
    path: ./providers/default.yaml
    health-check:
      enable: true
      interval: 300
      url: http://www.gstatic.com/generate_204

# 代理组配置
proxy-groups:
  # ==== 主组 ====
  - name: "🚀 所有-手动"
    type: select
    use:
      - default

  - name: "🚀 所有-自动"
    type: url-test
    use:
      - default
    url: "http://www.gstatic.com/generate_204"
    interval: 300

  - name: "🎯 全球直连"
    type: select
    proxies:
      - DIRECT

  # ==== 香港 ====
  - name: "🇭🇰 香港-手动"
    type: select
    use:
      - default
    filter: "^(?i).*(港|香港|HK|hongkong).*$"

  - name: "🇭🇰 香港-自动"
    type: url-test
    use:
      - default
    filter: "^(?i).*(港|香港|HK|hongkong).*$"
    url: "http://www.gstatic.com/generate_204"
    interval: 300

  - name: "🇭🇰 香港-故转"
    type: fallback
    use:
      - default
    filter: "^(?i).*(港|香港|HK|hongkong).*$"
    url: "http://www.gstatic.com/generate_204"
    interval: 300

  # ==== 台湾 ====
  - name: "🇹🇼 台湾-手动"
    type: select
    use:
      - default
    filter: "^(?i).*(台|台湾|TW|taiwan).*$"

  - name: "🇹🇼 台湾-自动"
    type: url-test
    use:
      - default
    filter: "^(?i).*(台|台湾|TW|taiwan).*$"
    url: "http://www.gstatic.com/generate_204"
    interval: 300

  - name: "🇹🇼 台湾-故转"
    type: fallback
    use:
      - default
    filter: "^(?i).*(台|台湾|TW|taiwan).*$"
    url: "http://www.gstatic.com/generate_204"
    interval: 300

  # ==== 日本 ====
  - name: "🇯🇵 日本-手动"
    type: select
    use:
      - default
    filter: "^(?i).*(日|日本|JP|japan).*$"

  - name: "🇯🇵 日本-自动"
    type: url-test
    use:
      - default
    filter: "^(?i).*(日|日本|JP|japan).*$"
    url: "http://www.gstatic.com/generate_204"
    interval: 300

  - name: "🇯🇵 日本-故转"
    type: fallback
    use:
      - default
    filter: "^(?i).*(日|日本|JP|japan).*$"
    url: "http://www.gstatic.com/generate_204"
