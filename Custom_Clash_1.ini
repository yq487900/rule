    type: select
    use:
      - default
    filter: "^(?i)(?!.*(港|香港|HK|hongkong|台|台湾|TW|taiwan|日|日本|JP|japan|新|新加坡|SG|singapore)).*$"

  - name: "🌐 其他-自动"
